name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: make install
      - name: Test
        run: make test
      - name: Demo (review packet must stay reproducible)
        run: |
          make demo || true   # demo exits non-zero by design when the sample DPA is BLOCKED
          test -f examples/review-packet.md
